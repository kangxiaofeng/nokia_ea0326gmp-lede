name: 编译 LEDE 固件

on:
  schedule:
    - cron: '0 3 1 * *'
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: 检查初始空间
      run: |
        df -h

    - name: 清理系统空间
      run: |
        sudo apt-get clean
        sudo apt-get autoremove -y
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL /opt/microsoft /opt/pipx /usr/share/swift
        df -h

    - name: 安装依赖
      run: |
        sudo apt-get update -y
        sudo apt-get install -y \
          ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache cmake cpio curl device-tree-compiler flex gawk gcc-multilib \
          gettext genisoimage git gperf help2man intltool libc6-dev-i386 libelf-dev \
          libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
          libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev \
          libtool llvm ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools \
          python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo \
          uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev jq zstd libzstd-dev

    - name: 缓存 ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          ccache-${{ runner.os }}-

    - name: 克隆 LEDE 并更新 feeds
      run: |
        git clone --depth=1 https://github.com/coolsnowwolf/lede.git
        cd lede
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 恢复工具链缓存
      uses: actions/cache@v4
      id: cache-toolchain
      with:
        path: |
          lede/staging_dir/toolchain-*
          lede/staging_dir/host
          lede/staging_dir/hostpkg
        key: toolchain-${{ runner.os }}-${{ hashFiles('.config') }}
    - name: 复制配置文件
      run: |
        cp .config lede/.config
        cd lede
        echo 'CONFIG_CCACHE=y' >> .config
        echo 'CONFIG_BUILDBOT=y' >> .config
        echo 'CONFIG_SINGLE_IMAGE_FILESYSTEM=y' >> .config
        echo 'CONFIG_CCACHE_DIR="/home/runner/.ccache"' >> .config
        mkdir -p ~/.ccache

    - name: 编译固件
      id: compile
      env:
        CCACHE_MAXSIZE: 2G
        CCACHE_SLOPPINESS: file_macro,locale,time_macros
      run: |
        cd lede
        make defconfig
        make download -j$(($(nproc)+1)) V=s
        make -j$(($(nproc)+1)) V=s
        if [ $? -ne 0 ]; then
          echo "编译失败"
          exit 1
        fi

    - name: 验证固件文件
      run: |
        cd lede
        ls -l bin/targets/*/*/*.bin || true
        if [ ! -d "bin/targets" ]; then
          echo "错误：固件目录不存在"
          exit 1
        fi
        if ! ls bin/targets/*/*/*.bin 1> /dev/null 2>&1; then
          echo "错误：未找到任何固件文件"
          exit 1
        fi

    - name: 生成构建信息
      id: buildinfo
      run: |
        echo "BUILD_DATE=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_ENV
        echo "BUILD_TAG=$(TZ='Asia/Shanghai' date +'%Y%m%d')" >> $GITHUB_ENV
        echo "GIT_REV=$(git -C lede rev-parse --short HEAD)" >> $GITHUB_ENV

    - name: 上传到 Release
      if: ${{ steps.compile.outcome == 'success' }}
      uses: ncipollo/release-action@v1
      with:
        tag: OpenWrt_nokia_ea0326gmp_${{ env.BUILD_TAG }}
        artifacts: "lede/bin/targets/*/*/*.bin"
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          ### 基于 Lean 的 LEDE 源码构建
          **首次使用建议全新刷写**

          **基本信息**
          - 管理 IP: 192.168.1.1
          - 用户名: root
          - 密码: password
          - 设备型号: nokia_ea0326gmp

          **固件说明**
          - `*-initramfs-kernel.bin`: 完整系统镜像，适合首次刷机或系统恢复
          - `*-squashfs-sysupgrade.bin`: 系统升级包，适合日常更新（保留配置）

          **使用建议**
          - 首次刷机：使用 initramfs 版本
          - 系统升级：使用 sysupgrade 版本
          - 系统变砖：使用 initramfs 版本恢复

          **构建信息**
          - 构建日期: ${{ env.BUILD_DATE }}
          - 源码版本: ${{ env.GIT_REV }}
