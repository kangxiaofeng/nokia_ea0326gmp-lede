name: Build LEDE

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Initial disk cleanup
        run: |
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo rm -rf /usr/share/doc/*
          sudo rm -rf /usr/share/man/*
          sudo rm -rf /usr/share/locale/*
          sudo rm -rf /var/cache/apt/*
          df -h

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libssl-dev python python2.7-dev python3 python3-dev \
          python3-pip python3-setuptools python3-venv rsync unzip wget \
          python3-yaml device-tree-compiler time

      - name: Setup ccache
        run: |
          ccache -M 1G
          ccache -s

      - name: Build LEDE
        run: |
          # Clean any previous build artifacts
          rm -rf bin/
          rm -rf build_dir/
          rm -rf staging_dir/
          
          # Update feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Configure build
          make defconfig
          
          # Build with reduced parallel jobs and ccache
          make -j2 V=s
          
          # Clean up build artifacts
          find . -type f -name "*.o" -delete
          find . -type f -name "*.d" -delete
          find . -type f -name "*.a" -delete
          find . -type f -name "*.so" -delete
          find . -type f -name "*.la" -delete
          find . -type f -name "*.lo" -delete
          find . -type f -name "*.log" -delete
          find . -type f -name "*.gz" -delete
          find . -type f -name "*.xz" -delete
          find . -type f -name "*.bz2" -delete
          find . -type f -name "*.tar" -delete
          find . -type f -name "*.zip" -delete
          
          # Check disk space
          df -h

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: lede-build
          path: bin/
          retention-days: 3

      - name: Cleanup on failure
        if: failure()
        run: |
          df -h
          sudo rm -rf bin/
          sudo rm -rf build_dir/
          sudo rm -rf staging_dir/
          sudo rm -rf tmp/
          sudo rm -rf dl/
          sudo rm -rf logs/
          sudo rm -rf .ccache/
          df -h

      - name: Final cleanup
        if: always()
        run: |
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo rm -rf /usr/share/doc/*
          sudo rm -rf /usr/share/man/*
          sudo rm -rf /usr/share/locale/*
          sudo rm -rf /var/cache/apt/*
          df -h 
